name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:  # 手动触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/1panel/www/sites/indeed-flow-prod/feng-farm

            # 拉取最新代码
            git pull origin main

            # 安装依赖
            cd games/farm/server && npm install --production

            # 创建配置文件（从Secrets注入）
            cat > ../ecosystem.config.js << ENVEOF
            module.exports = {
              apps: [{
                name: 'feng-farm',
                script: './games/farm/server/server.js',
                interpreter: '/home/openclaw/.nvm/versions/node/v20.20.1/bin/node',
                cwd: '/opt/1panel/www/sites/indeed-flow-prod/feng-farm',
                instances: 1,
                autorestart: true,
                watch: false,
                max_memory_restart: '500M',
                env: {
                  NODE_ENV: 'production',
                  PORT: 3007,
                  LLM_API_URL: '${{ secrets.LLM_API_URL }}',
                  LLM_API_KEY: '${{ secrets.LLM_API_KEY }}',
                  LLM_MODEL: '${{ secrets.LLM_MODEL }}'
                },
                error_file: '/var/log/pm2/feng-farm-error.log',
                out_file: '/var/log/pm2/feng-farm-out.log',
                log_date_format: 'YYYY-MM-DD HH:mm:ss Z',
                merge_logs: true
              }]
            };
            ENVEOF

            # 重启服务
            pm2 restart feng-farm || pm2 start ecosystem.config.js

            echo "Deploy completed!"
